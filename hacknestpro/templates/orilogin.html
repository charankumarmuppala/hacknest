{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | HackNest</title>
    
    <!-- Google Fonts: Inter & Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #18181b;
            --primary-hover: #09090b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --bg-light: #f9fafb;
            --font-inter: 'Inter', sans-serif;
            --font-poppins: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: var(--font-inter);
            background-color: #ffffff;
            color: var(--text-main);
            overflow: hidden;
        }

        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ── LEFT PANEL (Login Form) ── */
        .left-panel {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 80px;
            background-color: #ffffff;
            position: relative;
            overflow-y: auto;
        }

        .left-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brand-logo {
            font-family: var(--font-poppins);
            font-size: 24px;
            font-weight: 800;
            color: #000000;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .brand-logo::after {
            content: '.';
            color: var(--accent);
        }

        .brand-logo span {
            background: linear-gradient(180deg, #38bdf8 30%, #0ea5e9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-content {
            max-width: 420px;
            width: 100%;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 28px;
            padding: 20px 0;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .login-title {
            font-family: var(--font-poppins);
            font-size: 40px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .login-subtitle {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Form Inputs */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .floating-input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--bg-light);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        .floating-input:focus {
            border-color: var(--text-main);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.05);
        }

        /* Float Label Effect */
        .floating-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-muted);
            pointer-events: none;
            transition: all 0.2s ease;
            background-color: transparent;
        }

        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: 0;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
            padding: 0 4px;
            background-color: #ffffff;
            transform: translateY(-50%) scale(0.9);
            left: 12px;
        }

        .forgot-link {
            align-self: flex-end;
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.15s ease;
            margin-top: -8px;
        }

        .forgot-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* Submit Button */
        .login-submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 30px;
            background-color: var(--primary);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
        }

        .login-submit-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .login-submit-btn:active {
            transform: translateY(0);
        }

        /* Footer Links */
        .left-footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            width: 100%;
        }

        .left-footer a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .left-footer a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
            width: 50%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px;
            background-color: #0b0a13;
            overflow: hidden;
        }

        .right-panel-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('{% static "images/hackathon_cosmic.png" %}');
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 0.5s ease-in-out, opacity 0.3s ease;
        }

        .right-panel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(11, 10, 19, 0.2) 0%, rgba(11, 10, 19, 0.7) 100%);
            z-index: 2;
        }

        .right-content-wrapper {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .right-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .community-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 13.5px;
            font-weight: 500;
        }

        .right-nav-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .signup-link-white {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }

        .signup-link-white:hover {
            opacity: 1;
        }

        .join-us-btn {
            padding: 10px 22px;
            border: 1.5px solid #ffffff;
            border-radius: 30px;
            background-color: transparent;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .join-us-btn:hover {
            background-color: #ffffff;
            color: #0b0a13;
        }

        .quote-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .quote-icon {
            font-size: 64px;
            font-family: var(--font-poppins);
            line-height: 1;
            color: #ffffff;
            opacity: 0.9;
            height: 36px;
            font-weight: 800;
        }

        .quote-text {
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
            max-width: 480px;
            letter-spacing: -0.5px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .carousel-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
        }

        .slide-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slide-number-active {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .indicator-track {
            width: 80px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.25);
            position: relative;
            border-radius: 2px;
        }

        .indicator-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 16.66%;
            background-color: #ffffff;
            border-radius: 2px;
        }

        .slide-number-total {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-circles {
            display: flex;
            gap: 12px;
        }

        .nav-arrow-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            background-color: transparent;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-arrow-circle:hover {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .nav-arrow-circle svg {
            width: 18px;
            height: 18px;
            stroke-width: 2px;
        }

        @media (max-width: 1024px) {
            .left-panel {
                width: 100%;
                padding: 40px;
            }
            .right-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        
        <!-- Left Panel: Login Form -->
        <section class="left-panel">
            <header class="left-header">
                <a href="/" class="brand-logo">Hack<span>Nest</span></a>
            </header>

            <main class="login-content">
                <div class="title-group">
                    <h1 class="login-title">Welcome Back!</h1>
                    <p class="login-subtitle">Sign in to continue your HackNest journey.</p>
                    {% if error %}
                    <div class="error-message" style="background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 16px; font-family: 'Poppins', sans-serif; text-align: left;">
                        {{ error }}
                    </div>
                    {% endif %}
                </div>

                <!-- Main Form -->
                <form class="form-group" method="POST" action="{% url 'orilogin' %}">
                    {% csrf_token %}
                    
                    <div class="input-wrapper">
                        <input type="text" id="userid" name="username" class="floating-input" placeholder=" " required autocomplete="username">
                        <label for="userid" class="floating-label">User ID</label>
                    </div>

                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="floating-input" placeholder=" " required autocomplete="current-password">
                        <label for="password" class="floating-label">Password</label>
                    </div>

                    <a href="#" class="forgot-link">Forgot password?</a>

                    <button type="submit" class="login-submit-btn">Log In</button>
                </form>
            </main>


        </section>

        <!-- Right Panel: High-fidelity Cosmic Hackathon Branding -->
        <section class="right-panel">
            <div class="right-panel-bg"></div>
            <div class="right-panel-overlay"></div>
            
            <div class="right-content-wrapper">
                <header class="right-header">
                    <div class="community-badge">
                        <!-- Tech Icon SVG -->
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4 17 10 11 4 5"></polyline>
                            <line x1="12" y1="19" x2="20" y2="19"></line>
                        </svg>
                        <span>Largest Hackathon Community</span>
                    </div>

                </header>

                <div class="right-bottom-content" style="margin-top: auto; display: flex; flex-direction: column; gap: 20px; width: 100%;">
                    <div class="quote-container" style="margin-bottom: 0;">
                        <div class="quote-icon">“</div>
                        <h2 class="quote-text">Build the future you want in a universe of innovation!</h2>
                    </div>

                    <footer class="carousel-bottom" style="margin-top: 0;">
                        <div class="slide-indicator">
                            <span class="slide-number-active">01</span>
                            <div class="indicator-track">
                                <div class="indicator-fill"></div>
                            </div>
                            <span class="slide-number-total">06</span>
                        </div>
                        <div class="nav-circles">
                            <button class="nav-arrow-circle" aria-label="Previous Slide">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </button>
                            <button class="nav-arrow-circle" aria-label="Next Slide">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </button>
                        </div>
                    </footer>
                </div>
            </div>
        </section>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const slides = [
                {
                    image: "{% static 'images/hackathon_cosmic.png' %}",
                    quote: "Build the future you want in a universe of innovation!",
                    number: "01"
                },
                {
                    image: "{% static 'images/hackathon_team_cosmic.png' %}",
                    quote: "Collaborate and co-create in a galaxy of infinite possibilities!",
                    number: "02"
                },
                {
                    image: "{% static 'images/hackathon_ai_cosmic.png' %}",
                    quote: "Innovate beyond limits and deploy your ideas to the stars!",
                    number: "03"
                }
            ];

            let currentSlide = 0;
            const bgElement = document.querySelector(".right-panel-bg");
            const quoteElement = document.querySelector(".quote-text");
            const numberElement = document.querySelector(".slide-number-active");
            const fillElement = document.querySelector(".indicator-fill");
            const prevBtn = document.querySelector('button[aria-label="Previous Slide"]');
            const nextBtn = document.querySelector('button[aria-label="Next Slide"]');

            const totalElement = document.querySelector(".slide-number-total");
            if (totalElement) {
                totalElement.textContent = "0" + slides.length;
            }

            function updateSlide(index) {
                currentSlide = index;
                if (currentSlide < 0) currentSlide = slides.length - 1;
                if (currentSlide >= slides.length) currentSlide = 0;

                const slide = slides[currentSlide];

                bgElement.style.opacity = 0.8;
                quoteElement.style.opacity = 0;
                quoteElement.style.transform = "translateY(10px)";

                setTimeout(() => {
                    bgElement.style.backgroundImage = `url('${slide.image}')`;
                    quoteElement.textContent = slide.quote;
                    numberElement.textContent = slide.number;
                    
                    const percentage = ((currentSlide + 1) / slides.length) * 100;
                    fillElement.style.width = percentage + "%";

                    bgElement.style.opacity = 1;
                    quoteElement.style.opacity = 1;
                    quoteElement.style.transform = "translateY(0)";
                }, 200);
            }

            if (prevBtn && nextBtn) {
                prevBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    updateSlide(currentSlide - 1);
                });

                nextBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    updateSlide(currentSlide + 1);
                });
            }

            setInterval(() => {
                updateSlide(currentSlide + 1);
            }, 6000);
        });
    </script>
</body>
</html>
