{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | HackNest</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --agency-bg: #0c0806;
            --agency-accent: #ff5722;
            --agency-accent-hover: #e64a19;
            --agency-text-primary: #ffffff;
            --agency-text-muted: #8c827d;
            --agency-border: rgba(255, 87, 34, 0.06);
            --agency-badge-bg: #150f0c;
            --agency-badge-border: #2c1e19;
            --agency-font-display: 'Bebas Neue', sans-serif;
            --agency-font-mono: 'Space Mono', 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--agency-bg);
            color: var(--agency-text-primary);
            overflow: hidden;
        }

        /* Custom Orange Cursor */
        html,
        body,
        a,
        button,
        input,
        select,
        textarea,
        [role="button"] {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 20 20"><path fill="%23ff5722" stroke="%23ffffff" stroke-width="1.5" d="M2.5,2v13.5l3.8-3.8l2.6,5.1l2.4-1.2l-2.6-5.1h5.3z"/></svg>') 1 1, auto !important;
        }

        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
            background-color: var(--agency-bg);
        }

        /* Grid lines overlay */
        .hero-grid-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .hero-grid-overlay .grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--agency-border);
        }

        /* Background Glow */
        .hero-glow-bg {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 87, 34, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(50px);
        }

        /* ── LEFT PANEL (Sign Up Form) ── */
        .left-panel {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 60px 48px 80px;
            background-color: var(--agency-bg);
            position: relative;
            z-index: 2;
            overflow-y: auto;
        }

        .left-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            max-width: 420px;
            margin-left: auto;
            z-index: 10;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .brand-logo-text span {
            color: var(--agency-accent);
        }

        .login-content {
            max-width: 420px;
            width: 100%;
            margin: auto 0 auto auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 20px 0;
            z-index: 10;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .login-title {
            font-family: 'Poppins', sans-serif;
            font-size: 38px;
            font-weight: 700;
            color: var(--agency-text-primary);
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .login-subtitle {
            font-size: 15px;
            color: var(--agency-text-muted);
            line-height: 1.5;
        }

        /* Google Login Button */
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            background-color: #150f0c;
            color: var(--agency-text-primary);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .google-btn:hover {
            background-color: transparent;
            border-color: var(--agency-accent);
            color: var(--agency-accent);
            transform: translateY(-1px);
        }

        /* Divider "or" */
        .or-divider {
            display: flex;
            align-items: center;
            color: var(--agency-text-muted);
            font-size: 13px;
            font-weight: 400;
            margin: 4px 0;
        }

        .or-divider::before,
        .or-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: rgba(255, 87, 34, 0.12);
        }

        .or-divider::before {
            margin-right: 16px;
        }

        .or-divider::after {
            margin-left: 16px;
        }

        /* Form Inputs */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .floating-input {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            background-color: #150f0c;
            font-size: 14px;
            font-family: inherit;
            color: var(--agency-text-primary);
            outline: none;
            transition: all 0.2s ease;
        }

        .floating-input:focus {
            border-color: var(--agency-accent);
            background-color: #150f0c;
            box-shadow: 0 0 12px rgba(255, 87, 34, 0.2);
        }

        /* Float Label Effect */
        .floating-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--agency-text-muted);
            pointer-events: none;
            transition: all 0.2s ease;
            background-color: transparent;
        }

        .floating-input:focus ~ .floating-label,
        .floating-input:not(:placeholder-shown) ~ .floating-label {
            top: 0;
            font-size: 11px;
            font-weight: 600;
            color: var(--agency-accent);
            padding: 0 6px;
            background-color: var(--agency-bg);
            transform: translateY(-50%) scale(0.9);
            left: 12px;
        }

        /* Submit Button */
        .login-submit-btn {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--agency-accent);
            border-radius: 6px;
            background-color: var(--agency-accent);
            color: #ffffff;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 8px;
        }

        .login-submit-btn:hover {
            background-color: transparent;
            color: var(--agency-accent);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255, 87, 34, 0.2);
        }

        /* Footer Links */
        .left-footer {
            text-align: left;
            font-size: 14px;
            color: var(--agency-text-muted);
            width: 100%;
            max-width: 420px;
            margin-left: auto;
            z-index: 10;
        }

        .left-footer a {
            color: var(--agency-accent);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .left-footer a:hover {
            color: var(--agency-accent-hover);
            text-decoration: underline;
        }

        .scramble-text {
            white-space: nowrap;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
            width: 50%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px;
            background-color: #0c0806;
            overflow: hidden;
        }

        .right-panel-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 0.5s ease-in-out, opacity 0.3s ease;
            /* Radial mask to blend/merge image borders into background */
            mask-image: radial-gradient(circle, black 35%, transparent 75%);
            -webkit-mask-image: radial-gradient(circle, black 35%, transparent 75%);
        }

        .right-panel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(12, 8, 6, 0.2) 0%, rgba(12, 8, 6, 0.8) 100%);
            z-index: 2;
        }

        .right-content-wrapper {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .right-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
        }

        .join-us-btn {
            padding: 10px 22px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            background-color: transparent;
            color: #ffffff;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .join-us-btn:hover {
            border-color: var(--agency-accent);
            color: var(--agency-accent);
            background-color: transparent;
        }

        /* Bottom Quote Area */
        .quote-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .quote-icon {
            font-size: 64px;
            font-family: var(--agency-font-display);
            line-height: 1;
            color: var(--agency-accent);
            opacity: 0.9;
            height: 36px;
            font-weight: 800;
        }

        .quote-text {
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
            max-width: 480px;
            letter-spacing: -0.5px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Bottom Indicators & Navigation */
        .carousel-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
        }

        .slide-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slide-number-active {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .indicator-track {
            width: 80px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.25);
            position: relative;
            border-radius: 2px;
        }

        .indicator-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 33.33%;
            background-color: var(--agency-accent);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .slide-number-total {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
        }

        .nav-circles {
            display: flex;
            gap: 12px;
        }

        .nav-arrow-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-color: transparent;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-arrow-circle:hover {
            border-color: var(--agency-accent);
            color: var(--agency-accent);
            background-color: rgba(255, 87, 34, 0.05);
        }

        .nav-arrow-circle svg {
            width: 18px;
            height: 18px;
            stroke-width: 2px;
        }

        /* ── RESPONSIVE DESIGN ── */
        @media (max-width: 1024px) {
            .left-panel {
                width: 100%;
                padding: 48px 40px;
            }
            .right-panel {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        
        <!-- Grid lines overlay -->
        <div class="hero-grid-overlay">
            <div class="grid-line" style="left: 16.66%;"></div>
            <div class="grid-line" style="left: 33.33%;"></div>
            <div class="grid-line" style="left: 66.66%;"></div>
            <div class="grid-line" style="left: 83.33%;"></div>
        </div>

        <!-- Background Glow -->
        <div class="hero-glow-bg"></div>
        
        <!-- Left Panel: Signup Form -->
        <section class="left-panel">
            <header class="left-header">
                <a href="/" class="brand-logo">
                    <!-- Elegant double geometric arrow logo -->
                    <svg width="34" height="24" viewBox="0 0 34 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 2H14L10 12L14 22H4L0 12L4 2Z" fill="#ff5722" />
                        <path d="M20 2H30L26 12L30 22H20L16 12L20 2Z" fill="#ff5722" />
                    </svg>
                    <span class="brand-logo-text">Hack<span>Nest</span></span>
                </a>
            </header>

            <main class="login-content">
                <div class="title-group">
                    <h1 class="login-title">Join Us!</h1>
                    <p class="login-subtitle">Create your HackNest account to get started.</p>
                    {% if error %}
                    <div class="error-message" style="background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #ef4444; padding: 12px; border-radius: 8px; font-size: 14px; margin-top: 16px; font-family: 'Poppins', sans-serif; text-align: left;">
                        {{ error }}
                    </div>
                    {% endif %}
                </div>

                <!-- Google Signup Option -->
                <button class="google-btn scramble-trigger">
                    <!-- Google Logo SVG -->
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.2-5.136 4.2A5.72 5.72 0 0 1 8.28 12.87a5.72 5.72 0 0 1 5.711-5.73 5.58 5.58 0 0 1 3.903 1.548l3.056-3.08A9.878 9.878 0 0 0 13.99 2.5a9.99 9.99 0 0 0-9.99 10 9.99 9.99 0 0 0 9.99 10c5.56 0 9.89-3.9 9.89-9.96 0-.585-.05-1.17-.15-1.74H12.24Z"/>
                        <path fill="#4285F4" d="M23.73 12.24c0-.585-.05-1.17-.15-1.74H12.24v4.115h6.887a5.9 5.9 0 0 1-2.56 3.87l3.02 2.34c1.76-1.63 2.78-4.02 2.78-6.96Z"/>
                        <path fill="#FBBC05" d="M6.35 14.77a5.95 5.95 0 0 1-.31-1.9c0-.66.11-1.29.31-1.9L3.33 8.62a9.92 9.92 0 0 0-.84 4.25c0 1.5.3 2.93.84 4.25l3.02-2.35Z"/>
                        <path fill="#34A853" d="M13.99 21.5c2.7 0 4.96-.9 6.62-2.43l-3.02-2.34c-.84.57-1.92.91-3.6.91-2.77 0-5.12-1.87-5.96-4.38l-3.02 2.35c1.67 3.3 5.09 5.89 8.98 5.89Z"/>
                    </svg>
                    <span class="scramble-text">Sign up with Google</span>
                </button>

                <div class="or-divider">or</div>

                <!-- Main Form -->
                <form class="form-group" method="POST" action="{% url 'signup' %}">
                    {% csrf_token %}
                    
                    <div class="input-wrapper">
                        <input type="text" id="fullname" name="fullname" class="floating-input" placeholder=" " required autocomplete="name">
                        <label for="fullname" class="floating-label">Full name</label>
                    </div>

                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" class="floating-input" placeholder=" " required autocomplete="email">
                        <label for="email" class="floating-label">Your email</label>
                    </div>

                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="floating-input" placeholder=" " required autocomplete="new-password">
                        <label for="password" class="floating-label">Password</label>
                    </div>

                    <button type="submit" class="login-submit-btn scramble-trigger"><span class="scramble-text">Sign Up</span></button>
                </form>
            </main>

            <footer class="left-footer">
                <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
            </footer>
        </section>

        <!-- Right Panel: High-fidelity Cosmic Hackathon Branding -->
        <section class="right-panel">
            <div class="right-panel-bg"></div>
            <div class="right-panel-overlay"></div>
            
            <div class="right-content-wrapper">
                <header class="right-header">
                    <div class="right-nav-actions">
                        <a href="{% url 'login' %}" class="join-us-btn scramble-trigger"><span class="scramble-text">Log In</span></a>
                    </div>
                </header>

                <div class="right-bottom-content" style="margin-top: auto; display: flex; flex-direction: column; gap: 20px; width: 100%;">
                    <div class="quote-container" style="margin-bottom: 0;">
                        <div class="quote-icon">“</div>
                        <h2 class="quote-text">Build the future you want in a universe of innovation!</h2>
                    </div>

                    <footer class="carousel-bottom" style="margin-top: 0;">
                        <div class="slide-indicator">
                            <span class="slide-number-active">01</span>
                            <div class="indicator-track">
                                <div class="indicator-fill"></div>
                            </div>
                            <span class="slide-number-total">03</span>
                        </div>
                        <div class="nav-circles">
                            <button class="nav-arrow-circle" aria-label="Previous Slide">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </button>
                            <button class="nav-arrow-circle" aria-label="Next Slide">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                                </svg>
                            </button>
                        </div>
                    </footer>
                </div>
            </div>
        </section>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const slides = [
                {
                    image: "{% static 'images/hackathon_2d.png' %}",
                    quote: "Build the future you want in a universe of innovation!",
                    number: "01"
                },
                {
                    image: "{% static 'images/hackathon_2d_team.png' %}",
                    quote: "Great minds code alike—collaborate, build, and conquer together.",
                    number: "02"
                },
                {
                    image: "{% static 'images/hackathon_2d_ideas.png' %}",
                    quote: "Transform bold ideas into working code in a single weekend.",
                    number: "03"
                }
            ];

            let currentSlide = 0;
            const bgElement = document.querySelector(".right-panel-bg");
            const quoteElement = document.querySelector(".quote-text");
            const numberElement = document.querySelector(".slide-number-active");
            const fillElement = document.querySelector(".indicator-fill");
            const prevBtn = document.querySelector('button[aria-label="Previous Slide"]');
            const nextBtn = document.querySelector('button[aria-label="Next Slide"]');

            const totalElement = document.querySelector(".slide-number-total");
            if (totalElement) {
                totalElement.textContent = "0" + slides.length;
            }

            // Set initial background image
            if (bgElement && slides[0]) {
                bgElement.style.backgroundImage = `url('${slides[0].image}')`;
            }

            function updateSlide(index) {
                currentSlide = index;
                if (currentSlide < 0) currentSlide = slides.length - 1;
                if (currentSlide >= slides.length) currentSlide = 0;

                const slide = slides[currentSlide];

                // Fade out/slide out effect
                bgElement.style.opacity = 0.8;
                quoteElement.style.opacity = 0;
                quoteElement.style.transform = "translateY(10px)";

                setTimeout(() => {
                    bgElement.style.backgroundImage = `url('${slide.image}')`;
                    quoteElement.textContent = slide.quote;
                    numberElement.textContent = slide.number;
                    
                    const percentage = ((currentSlide + 1) / slides.length) * 100;
                    fillElement.style.width = percentage + "%";

                    bgElement.style.opacity = 1;
                    quoteElement.style.opacity = 1;
                    quoteElement.style.transform = "translateY(0)";
                }, 200);
            }

            if (prevBtn && nextBtn) {
                prevBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    updateSlide(currentSlide - 1);
                });

                nextBtn.addEventListener("click", (e) => {
                    e.preventDefault();
                    updateSlide(currentSlide + 1);
                });
            }

            // Auto-advance slide every 6 seconds
            setInterval(() => {
                updateSlide(currentSlide + 1);
            }, 6000);

            // --- Scramble Text Hover Effect ---
            const chars = "+-<>=-/@#$%&*!?";

            // Measure and lock sizes once fonts are ready
            document.fonts.ready.then(() => {
                document.querySelectorAll('.scramble-trigger').forEach(trigger => {
                    const targetTextEl = trigger.classList.contains('scramble-text') ? trigger : trigger.querySelector('.scramble-text');
                    if (!targetTextEl) return;

                    targetTextEl.style.display = 'inline-block';
                    const currentWidth = targetTextEl.getBoundingClientRect().width;
                    targetTextEl.style.width = `${Math.ceil(currentWidth)}px`;
                    targetTextEl.style.textAlign = 'center';
                });
            });

            document.querySelectorAll('.scramble-trigger').forEach(trigger => {
                let interval = null;
                let isAnimating = false;
                const targetTextEl = trigger.classList.contains('scramble-text') ? trigger : trigger.querySelector('.scramble-text');
                if (!targetTextEl) return;

                // Cache original text
                const originalText = targetTextEl.innerText.trim();
                targetTextEl.dataset.value = originalText;

                trigger.addEventListener('mouseenter', () => {
                    if (isAnimating) return;
                    isAnimating = true;
                    let iteration = 0;
                    clearInterval(interval);

                    interval = setInterval(() => {
                        targetTextEl.innerText = originalText
                            .split("")
                            .map((letter, index) => {
                                if (letter === " ") return " ";

                                if (index < iteration) {
                                    return originalText[index];
                                }
                                return chars[Math.floor(Math.random() * chars.length)];
                            })
                            .join("");

                        if (iteration >= originalText.length) {
                            clearInterval(interval);
                            targetTextEl.innerText = originalText;
                            isAnimating = false;
                        }

                        iteration += 0.6;
                    }, 20);
                });
            });
        });
    </script>
</body>
</html>
